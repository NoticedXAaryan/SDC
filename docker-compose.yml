services:

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-password}"]
    healthcheck: 
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
  migrator:
    build:
      context: .
      target: builder
    command: ["npx", "tsx", "scripts/migrate.ts"]
    env_file: [.env]

  app:
    build: .
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis: 
        condition: service_healthy
    env_file: [.env]

  worker:
    build: 
      context: .
      target: builder
    command: ["npx", "tsx", "worker.ts"]
    depends_on: 

      redis: 
        condition: service_healthy
    env_file: [.env]

