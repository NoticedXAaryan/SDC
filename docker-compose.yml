services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: club_admin
      POSTGRES_PASSWORD: club_password
      POSTGRES_DB: club_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=postgresql://club_admin:club_password@postgres:5432/club_db
    depends_on:
      - redis
      - postgres
    restart: always

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: sh -c "npx tsx scripts/migrate.ts && npx tsx worker.ts"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=postgresql://club_admin:club_password@postgres:5432/club_db
      - IS_WORKER=true
    depends_on:
      - redis
      - postgres
    restart: always

volumes:
  redisdata:
  pgdata:
