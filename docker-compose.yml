services:

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sdc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sdc_dev_pass}
      POSTGRES_DB: ${POSTGRES_DB:-sdc_os}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sdc}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - default
      - dokploy-network

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-password}"]
    healthcheck: 
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - default
      - dokploy-network

  migrator:
    build:
      context: .
      target: builder
    command: ["sh", "-c", "npx tsx scripts/migrate.ts && npx tsx scripts/set-owner.ts"]
    env_file: [.env]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - dokploy-network

  app:
    build: .
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis: 
        condition: service_healthy
    env_file: [.env]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - default
      - dokploy-network

  worker:
    build: 
      context: .
      target: worker-runner
    depends_on: 
      redis: 
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    env_file: [.env]
    restart: unless-stopped
    networks:
      - default
      - dokploy-network

volumes:
  pgdata:

networks:
  dokploy-network:
    external: true
