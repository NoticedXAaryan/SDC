services:

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-password}"]
    healthcheck: 
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
  app:
    build: .
    depends_on: 

      redis: 
        condition: service_healthy
    env_file: [.env]

  worker:
    build: .
    command: ["npm", "run", "worker"]
    depends_on: 

      redis: 
        condition: service_healthy
    env_file: [.env]

