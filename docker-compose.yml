services:

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-password}"]
    healthcheck: 
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
    networks:
      - default
      - dokploy-network

  migrator:
    build:
      context: .
      target: builder
    command: ["npx", "tsx", "scripts/migrate.ts"]
    env_file: [.env]
    networks:
      - default
      - dokploy-network

  app:
    build: .
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis: 
        condition: service_healthy
    env_file: [.env]
    networks:
      - default
      - dokploy-network

  worker:
    build: 
      context: .
      target: builder
    command: ["npx", "tsx", "worker.ts"]
    depends_on: 
      redis: 
        condition: service_healthy
    env_file: [.env]
    networks:
      - default
      - dokploy-network

networks:
  dokploy-network:
    external: true

