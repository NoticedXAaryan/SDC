services:

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-password}"]
    healthcheck: 
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - default

  migrator:
    build:
      context: .
      target: builder
    command: ["sh", "-c", "npx tsx scripts/migrate.ts && npx tsx scripts/set-owner.ts"]
    env_file: [.env]
    networks:
      - default

  app:
    build: .
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis: 
        condition: service_healthy
    env_file: [.env]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sdc-main-router.rule=Host(`sdc.aaaryan.space`)"
      - "traefik.http.routers.sdc-main-router.entrypoints=websecure"
      - "traefik.http.routers.sdc-main-router.tls.certresolver=letsencrypt"
      - "traefik.http.services.sdc-main-service.loadbalancer.server.port=3000"
      - "traefik.docker.network=dokploy-network"
    networks:
      - default
      - dokploy-network

  worker:
    build: 
      context: .
      target: worker-runner
    depends_on: 
      redis: 
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    env_file: [.env]
    restart: unless-stopped
    networks:
      - default

networks:
  dokploy-network:
    external: true
